# tmux 3.5a (built to ~/.local/bin) — remote dev host
# Deployed to the remote as ~/.tmux.conf by setup-remote.sh
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on

# Extended keys: distinguish Shift+Enter for apps that use it (matches laptop)
set -s extended-keys on
set -as terminal-features "xterm*:extkeys"

# Truecolor passthrough for ghostty over mosh
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc,xterm-256color:Tc"
set -g allow-passthrough on

set -g base-index 1
setw -g pane-base-index 1

# Terminal title = session name, so the laptop (Ghostty tabs, widget
# click-to-focus) can identify which tab holds which session.
set -g set-titles on
set -g set-titles-string "devbox:#S"

# Session persistence across the weekly Sat host reboot: continuum saves
# layout every 15 min (only while a client is attached — mosh keeps clients
# attached, so in practice always) and auto-restores on server start, i.e.
# on the first `devbox` after the reboot. Panes running claude come back
# as `claude --continue`, codex as `codex resume --last` (both resume the
# most recent conversation in that directory).
set -g @resurrect-processes '"claude->claude --continue" "codex->codex resume --last"'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux
