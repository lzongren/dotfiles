# tmux 3.5a (built to ~/.local/bin) — remote dev host
# Deployed to the remote as ~/.tmux.conf by setup-remote.sh
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on

# Extended keys: distinguish Shift+Enter for apps that use it (matches laptop)
set -s extended-keys on
set -as terminal-features "xterm*:extkeys"

# Truecolor passthrough for ghostty over mosh
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc,xterm-256color:Tc"
set -g allow-passthrough on

set -g base-index 1
setw -g pane-base-index 1
