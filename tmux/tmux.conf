# =============================================================================
# General
# =============================================================================
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"

# Allow applications (yazi, etc.) to query terminal capabilities through tmux
set -g allow-passthrough all
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000
set -g focus-events on
set -sg escape-time 0
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# =============================================================================
# Catppuccin theme (manual install — loaded before status line)
# =============================================================================
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "icon"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Status line
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#[fg=colour214]#(aws sts get-caller-identity --query \"Arn\" --output text 2>/dev/null | sed -n 's|.*assumed-role/\\([^/]*\\).*|\\1|p')#[default] #{E:@catppuccin_status_date_time}"

set -g @catppuccin_date_time_text " %b %d  %H:%M"

# =============================================================================
# Plugins (via TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore sessions
set -g @continuum-restore 'on'

# =============================================================================
# Keybindings
# =============================================================================
# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Easier splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows keep current path
bind c new-window -c "#{pane_current_path}"

# =============================================================================
# Initialize TPM (keep at the very bottom)
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'
